services:
  obsidian-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: obsidian-sync
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Vault and storage paths
      - VAULT_ROOT=/data/vault
      - TRASH_PATH=/data/trash
      - DB_PATH=/data/state.db
      # Maximum file size (100MB)
      - MAX_FILE_SIZE_MB=100
      # Security secrets (set these in Dokploy environment variables)
      - API_KEY=${API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      # Admin credentials
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
    volumes:
      # Persist vault and database
      - vault_data:/data
    networks:
      - obsidian-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  vault_data:
    driver: local

networks:
  obsidian-network:
    driver: bridge
